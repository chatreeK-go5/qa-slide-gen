name: Render Jira Metrics Charts

on:
  repository_dispatch:
    types: [render-slides]
  workflow_dispatch:
    inputs:
      date:
        description: 'Data date (YYYY-MM-DD). Leave blank to use latest.'
        required: false
        default: ''
  schedule:
    # Daily backup run at 06:00 UTC
    - cron: "0 6 * * *"

jobs:
  render:
    name: Render PNG dashboards
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.18.0"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright Chromium (required by slidev export)
        run: npx playwright install chromium --with-deps

      - name: Export Slidev slides as PNG
        run: |
          DATE="${{ github.event.client_payload.date || github.event.inputs.date || '' }}"
          if [ -n "$DATE" ]; then
            npm run render -- --date "$DATE"
          else
            npm run render
          fi

      - name: Commit and push artifacts
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add artifacts/
          if git diff --staged --quiet; then
            echo "No chart changes to commit."
          else
            git commit -m "chore: render charts [skip ci]"
            git pull --rebase
            git push
          fi
