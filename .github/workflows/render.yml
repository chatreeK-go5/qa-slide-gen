name: Render Jira Metrics Charts

on:
  push:
    paths:
      - "data/**"
  workflow_dispatch:
  schedule:
    # Daily backup run at 06:00 UTC
    - cron: "0 6 * * *"

jobs:
  render:
    name: Render PNG dashboards
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # Fetch full history so git push works on protected branches
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Render charts
        run: python scripts/render_charts.py

      - name: Commit and push artifacts
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add artifacts/
          # Only commit if there are staged changes
          if git diff --staged --quiet; then
            echo "No chart changes to commit."
          else
            git commit -m "chore: render charts [skip ci]"
            git push
          fi
