name: Render Jira Metrics Charts

on:
  workflow_dispatch:
    inputs:
      date:
        description: 'Data date (YYYY-MM-DD). Leave blank to use latest.'
        required: false
        default: ''

jobs:
  render:
    name: Render PNG dashboards
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.18.0"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright Chromium
        run: npx playwright install chromium --with-deps

      - name: Render charts
        run: |
          DATE="${{ github.event.client_payload.date || github.event.inputs.date || '' }}"
          if [ -n "$DATE" ]; then
            npm run render -- --date "$DATE"
          else
            npm run render
          fi

      - name: Upload charts as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: qa-charts-${{ github.run_id }}
          path: artifacts/
          retention-days: 30
